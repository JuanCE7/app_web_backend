version: "3.8"
services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-db_app_web}
      POSTGRES_USER: ${POSTGRES_USER:-jfcastillo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"